<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Activité Surprise</title>
    <meta name="description" content="Tire au sort une activité en famille">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#56ab2f">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header>
            <h1>🍃 Surprise</h1>
            <button id="nav-management-btn" aria-label="Gérer les activités">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </header>

        <!-- Main Picker View -->
        <main id="view-picker" class="view active">
            <div class="result-container">
                <p id="result-text">Prêt pour l'aventure ?</p>
            </div>
            
            <button id="btn-draw" class="primary-btn pulse">
                <span class="btn-text">Activité Surprise</span>
            </button>
        </main>

        <!-- Management View -->
        <main id="view-management" class="view">
            <div class="header-back">
                <button id="nav-home-btn" class="icon-btn">
                     <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
                </button>
                <h2>Gestion des Activités</h2>
            </div>

            <div class="card glass">
                <h3>Ajouter (une par ligne)</h3>
                <textarea id="input-activities" placeholder="Aller au parc&#10;Faire un gâteau&#10;Jeu de société" rows="4"></textarea>
                <button id="btn-add" class="secondary-btn">Ajouter au tirage</button>
            </div>

            <div class="card glass tabs">
                <div class="tab-headers">
                    <button class="tab-btn active" data-target="list-available">Disponibles (<span id="count-available">0</span>)</button>
                    <button class="tab-btn" data-target="list-blacklisted">Déjà faites (<span id="count-blacklisted">0</span>)</button>
                </div>
                
                <div id="list-available" class="tab-content active list-container">
                    <!-- Available items go here -->
                </div>

                <div id="list-blacklisted" class="tab-content list-container">
                    <!-- Blacklisted items go here with un-blacklist button -->
                </div>
            </div>
            <button id="btn-reset" class="danger-btn">Remettre à zéro (Tout disponible)</button>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
